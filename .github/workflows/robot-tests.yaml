name: Robot Tests

on:
  push:
    branches:
      - main
    paths:
      - 'tests/RobotTests/**'
      - 'frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'tests/RobotTests/**'
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: write  # needed to push to gh-pages

jobs:
  run-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tests/RobotTests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Robot Framework tests and capture result
        id: robot
        run: |
          mkdir -p output
          robot --outputdir output --variable BROWSER:headlesschrome tests/ || echo "ROBOT_FAILED=true" >> $GITHUB_ENV

      - name: Copy report as index.html (for GitHub Pages)
        run: |
          cp output/log.html output/index.html

      - name: Deploy report to GitHub Pages (gh-pages branch)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: tests/RobotTests/output

      - name: Fail job if Robot tests failed
        if: env.ROBOT_FAILED == 'true'
        run: exit 1
