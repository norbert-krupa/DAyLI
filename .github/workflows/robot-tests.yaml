name: Robot Framework Tests

on:
  push:
    branches:
      - main
    paths:
      - 'tests/RobotTests/**'
      - 'frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'tests/RobotTests/**'
      - 'frontend/**'
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tests/RobotTests

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Robot Framework tests (capture failures)
        run: |
          mkdir -p output
          robot --outputdir output --variable BROWSER:headlesschrome tests/
        continue-on-error: true

      - name: Upload Robot Framework output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-test-results
          path: tests/RobotTests/output/

  deploy-report:
    needs: run-tests
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download test results artifact
        uses: actions/download-artifact@v4
        with:
          name: robot-test-results
          path: output/

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: output/
