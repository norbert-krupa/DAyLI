name: Run Robot Tests and Deploy Report

on:
  push:
    branches:
      - main
    paths:
      - 'tests/RobotTests/**'
      - 'frontend/**'
  pull_request:
    branches:
      - main
    paths:
      - 'tests/RobotTests/**'
      - 'frontend/**'
  schedule:
    - cron: "0 0 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  run-tests:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: tests/RobotTests

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Robot Framework tests (tolerate failure)
        run: |
          mkdir -p output
          robot --outputdir output --variable BROWSER:headlesschrome tests/
        continue-on-error: true

      - name: Upload test results for GitHub Pages
        uses: actions/upload-pages-artifact@v2
        with:
          path: tests/RobotTests/output/

  deploy:
    needs: run-tests
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v2
